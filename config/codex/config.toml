personality = "pragmatic"
model_reasoning_effort = "xhigh"

[tui]
notifications = true
status_line = ["model-with-reasoning", "current-dir", "git-branch", "permissions", "approval-mode", "context-remaining", "fast-mode"]
status_line_use_colors = true

[notice]
fast_default_opt_out = true

[features]
terminal_resize_reflow = true

[projects."/home/dev/project"]
trust_level = "trusted"

[projects."/home/dev/project/backend"]
trust_level = "trusted"

[mcp_servers.notion]
url = "https://mcp.notion.com/mcp"

# Do not commit [mcp_servers.*.env] token values here.
# Let BuilderOS credentials, deploy-key references, or VM env injection provide secrets.
